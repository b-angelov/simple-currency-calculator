<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Валутен калкулатор</title>
    <style>

        html{
            font-size: 16px;
            line-height: 3.5em;
            color: rgb(12,5,5,0.8);
            font-weight: 800;
            text-shadow: 0.1em 0.1em 0.16em rgba(182, 21, 21, 0.66);
        }

        body{
            font-family: 'Noto Serif Bulgarian', serif;
            background-color: rgba(174, 234, 178, 0.11);
        }

        .logo{
            left: 37vw;
            top: 8vh;
            font-size: 8rem;
            position: absolute;
            width: 10vw;
            min-width: 10vw;
            height:5vh;
            text-align:center;
        }

        .logo > *{
            position: inherit;
            width: 100%;
            height: 100%;
            text-align: center;
        }

        .logo div{
            padding-left: 11vw;
        }

        time{
            position: absolute;
            top: 10vh;
            font-size: 7rem;
            color: rgba(252, 27, 28, 0.5);
            text-shadow: 0.01em 0.01em 0.02em rgba(22, 2, 8, 0.66);
        }


        #display{
            font-size: 2em;
            border-radius: 2em;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            align-content: center;
            justify-content: center;
            justify-items: center;
            border: solid 2px #891515;
            position: absolute;
            top: 30vh;
            min-height: 50vh;
            max-width: 23vw;
            backdrop-filter: blur(10px);

        }

        #display::before{
            content: '';
            position: relative;
            will-change: transform;
            width: 200%; height: 200%;
            top: -100%; left: -100%;
            background: linear-gradient( to bottom,rgb(256,256,256,0.9),rgb(256,256,256,0.9), rgba(53, 185, 8, 0.4), rgba(248, 7, 7, 0.4));
            background-size: 400% 400%;
            animation: gradient-shift 15s ease-in-out infinite;
        }

        .bg {
            background: linear-gradient( 90deg,rgb(256,256,256,0.57),rgba(53, 185, 8, 0.57), rgba(248, 7, 7, 0.57));
            background-size: 400% 400%;
            animation: gradient-shift 8s ease infinite;
        }
        .bg::before{
            content: '';
            position: relative;
            will-change: transform;
            width: 400%; height: 400%;
            top: -100%; left: -100%;
            background: linear-gradient( to bottom,rgb(256,256,256,0.57),rgba(53, 185, 8, 0.57), rgba(248, 7, 7, 0.57));
            background-size: 400% 400%;
            animation: gradient-shift 8s ease infinite;
        }

        .eu {
            background: linear-gradient( 90deg, rgba(6, 19, 111, 0.8), rgb(255, 255, 51, 0.45), rgba(6, 19, 111, 0.8));
            background-size: 400% 400%;
            animation: gradient-shift 8s ease-in-out infinite;
        }
        .eu::before{
            content: '';
            position: relative;
            will-change: transform;
            width: 200%; height: 200%;
            top: -100%; left: -100%;
            background: linear-gradient( 45deg, rgba(6, 19, 111, 0.3), rgb(6, 19, 111, 0.17), rgba(6, 19, 111, 0.3));
            background-size: 400% 400%;
            animation: gradient-shift 8s ease-in-out infinite;
        }

        [id^="result"]{
            border: solid 1px red;
            min-height: 70vh;
            max-height: 90vh;
            border-radius: 0.45em 0.55em 0.2em 0.3em;
            box-shadow: 0.2em 0.3em 0.1em #0d301f;
            background-color: rgba(241, 18, 18, 0.04);
            overflow-y: scroll;
        }

        form > div:last-child > div:last-child{
            box-shadow: -0.2em 0.3em 0.1em #0d301f;
            background-color: rgba(18, 96, 241, 0.04);

        }

        body,form,input,table{
            font-size: 1.2em;
        }

        #result-bgn{
            border-color: blue;
        }


        main{
            display: flex;
            flex-direction: column;
        }

        form{
            display: flex;
            font-size: 1.7em;
            gap: 18rem;
            /*align-items: center;*/
            align-content: center;
            text-align: center;
            width: 100%;
            justify-content: center;
            justify-items: center;
        }

        form div{
            display: flex;
            column-gap: 2em;
            row-gap: 0.3em;
            border-spacing: 0 1em;
            flex-direction: column;
            width: 30vw;
            max-width: 90%;
            align-content: center;
            align-items: center;
            text-align: center;
            justify-items: center;
            border-spacing: 3rem;
            border-collapse: unset;
            box-sizing: border-box;

        }

        input{
            width: 30vw;
            text-align: center;
            border: #abc solid 2px;
            border-radius: 0.1em 0.3em 0.4em 1em;
            box-shadow: -0.1em 0.15em 0.4em #0d301f;
        }

        form > div:last-child  input{
            border-radius: 0.1em 0.1em 1em 0.1em;
            box-shadow: 0.1em 0.15em 0.4em #0d301f;

        }

        hr{
            min-width:100%;
            min-height: 1rem;
            background-color: rgba(241, 202, 8, 0.62);
            border-radius: 0.5em;
            box-shadow: 0.02em 0.03em 0.01em #0d301f;
        }

        .source{
            color: rgb(251,25,25,0.7);
            font-size: 0.8em;
            text-shadow: 0.01em 0.01em 0.04em #0d301f;
        }

        .result{
            color: rgb(32,200,12,0.7);
            text-shadow: 0.02em 0.02em 0.03em #0d301f;
        }

        div.settings{
            position: absolute;
            display:flex;
            align-items: center;
            align-content: center;
            flex-direction: column;
            left: 42vw;
            bottom: 2vh;
            max-width: 20vw;

        }

        div.settings input{
            max-width: 8vw;
            border-radius: 0.2em 0.2em 1.8em 1.8em;
        }

        .animated-gradient {
            /* 1. Дефинирайте цветовете и ъгъла */
            background: linear-gradient(-45deg,
            #11dd11,
            #dd1111,
            #ffffff,
            #ffffff
            );

            /* 2. Увеличете размера, за да има накъде да се движи */
            background-size: 400% 400%;

            /* 3. Стартирайте анимацията */
            animation: gradient-shift 15s ease-in-out infinite;
        }

        @keyframes gradient-shift {
            0% { background-position: 0%,50%; }
            50% { background-position: 100%,50%; }
            100% { background-position: 0%,50%; }
        }

        .input-container{
            position: absolute;
            display: flex;
            gap:0.5rem;
            flex-direction: row;
            align-content: center;
            justify-content: center;
        }

        .input-container button{
            padding: .2em .4em;
            font-size: 0.9em;
            font-family: sans-serif;
            font-weight: 700;
            color: rgb(48, 48, 48, 0.7);
            text-shadow: 0.05em 0.05em 0.06em #575a59;
            border: 2px solid rgb(248, 248, 248);
        }

        .input-container .increase-btn{
            background-color: #09b809;
        }

        .input-container .decrease-btn{
            background-color: #f43613;
        }

        .input-container .left-art{
            border-radius: 1% 1% 30% 1%;
            corner-shape: scoop;
        }

        .input-container .right-art{}

        .input-container .left-rev{

            /* This cuts out a 30px inward curve from the top-left corner across ALL browsers */
            -webkit-mask-image: radial-gradient(circle at 0 0, transparent 30px, black 31px);
            mask-image: radial-gradient(circle at 0 0, transparent 30px, black 31px);
        }

        @media (max-width : 900px){

            body{
                height: 100%;
                width:100%;
                font-size: 0.88rem;
            }

            time{
                font-size: 1.78rem;
                top: 25%;
            }

            form{
                gap: 15%;
            }

            form div{
                width: 40%;
            }

            input{
                width: 90%;
            }

            #display{
                font-size: 1em;
                border-radius: 0.6em;
                font-weight: 900;
                /*display: flex;*/
                flex-direction: column;
                align-items: center;
                align-content: center;
                justify-content: center;
                justify-items: center;
                border: solid 2px #891515;
                position: absolute;
                top: 55%;
                min-height: 20vh;
                width: 100%;
                line-height: 0.5em;
            }

            .settings{
                align-content: center;
                left: 45%;
                align-items: center;
                max-width: 70%;
                bottom: 1%;
                top: 70vh;
                position: absolute;
                padding: 0px;
                margin: 0px;
                gap: 1px;
                padding-top: 2.5em;
            }

            .settings > *{
                line-height: 1.5em;
                display: inline;
                position: relative;
                overflow: visible;
                align-content: center;
                width: 50vw;
                padding: 0px;
                margin: 0px;
            }

            .settings input{
                min-width: 20vw;
            }

            [id^="result"]{
                max-width: 100%;
                width: 90%;
                min-height: 40vh;
                font-size: 1em;
                line-height: 1.5em;
            }

            [id^="result"] > div{
                width: 100%;
            }

            .logo{
                top: 3%;
                left: 34%;
                position: absolute;
            }

            hr{
                min-height: 0.5rem;
                padding: 0;
                margin:0;
            }


        }

        @media (max-width: 460px) and (min-height: 600px){
            body{
                font-size: 0.68rem;

            }

            #display{
                top:25%;
                min-width: 30%;
                padding: 0;
                margin: 0;
            }

            [id^="result"]{
                min-height: 70vh;
            }

            .settings{
                top: 85vh;
            }

            .logo{
                min-width: 15%;
                left: 28%;
            }

            time{
                top: 10%;
            }

            hr {
                margin: 0.4em;

            }

        }


    </style>
</head>
<body>
    <main>
        <form>
            <div>
                <label for="bgn">Сума в левове</label>
                <div class="input-container"><button class="decrease-btn left-art" onclick="decrease(event,'#bgn')">-</button><input type="number" placeholder="лева" id="bgn"/><button class="increase-btn right-art" onclick="increase(event,'#bgn')">+</button></div>
                <div id="result-bgn" class=""></div>
            </div>
            <time></time>
            <figure class="logo"></figure>
            <div id="display">
                <div class="source"></div>
                <hr>
                <div class="result"></div>
            </div>
            <div>
                <label for="eur">Сума в евро</label>
                <div class="input-container"><button class="decrease-btn right-art" onclick="decrease(event,'#eur')">-</button><input type="number" placeholder="евро" id="eur"/><button class="increase-btn left-rev" onclick="increase(event,'#eur')">+</button></div>
                <div id="result-eur" class=""></div>
            </div>
        </form>

        <div class="settings">
            <label for="step">Стъпка за автоматично увеличение</label>
            <input type="number" name="step" id="step" value="1"/>
        </div>


    </main>

    <script>
        const LOGO = null
        const INCREMENT_STEP = 1

        const eur = document.querySelector("#eur")
        const bgn = document.querySelector("#bgn")
        eur.step = INCREMENT_STEP
        bgn.step = INCREMENT_STEP
        const source = document.querySelector(".source")
        const result = document.querySelector(".result")
        const display = document.querySelector("#display")
        const displayHr = document.querySelector("#display hr")
        const step = document.querySelector("#step")
        const time_element = document.querySelector("time")
        const [resultBgn,resultEur] = document.querySelectorAll("[id^='result']")
        const currency_rate = 1.95583

        const figure = document.querySelector(".logo")
        let logo;
        if(LOGO){
            logo = document.createElement("img")
            logo.setAttribute("src", LOGO)
            logo.setAttribute("alt", "logo")
        }else{
            logo = document.createElement("div")
            logo.innerText += "⌨️"
        }
        figure.appendChild(logo)


        step.addEventListener("change", e => {
            bgn.step = e.target.value
            eur.step = e.target.value
        })

        const current_time = () => {
            const now = new Date();
            return `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`
        }

        function clock(){
            time_element.innerText =  current_time()
            setTimeout(()=>{
                clock()
            },1000)
        }

        function increase(e,className){
            e.preventDefault()
            const inp = document.querySelector(`${className}`)
            inp.value = parseFloat(inp.value) + parseFloat(step.value)
            const einp = new Event("input",{bubbles: true})
            const echng = new Event("change",{bubbles: true})
            inp.dispatchEvent(einp)
            inp.dispatchEvent(echng)
        }

        function decrease(e,className){
            e.preventDefault()
            const inp = document.querySelector(`${className}`)
            inp.value = parseFloat(inp.value) - parseFloat(step.value)
            const einp = new Event("input",{bubbles: true})
            const echng = new Event("change",{bubbles: true})
            inp.dispatchEvent(einp)
            inp.dispatchEvent(echng)
        }

        const form = document.querySelector("main form")
        form.addEventListener("submit",(e)=>e.preventDefault())

        window.addEventListener("load",clock)

        const round = (num) => parseFloat(num).toFixed(2)

        let currentBgnEl = document.createElement("div")
        let currentEurEl = document.createElement("div")
        resultEur.appendChild(currentEurEl)
        resultBgn.appendChild(currentBgnEl)

        bgn.addEventListener("input", (e) => {
            e.preventDefault()
            e.stopPropagation()
            source.innerHTML = `${e.target.value}лв.`
            result.innerHTML = `${round(e.target.value / currency_rate)}€`
            displayHr.classList.remove("eu")
            displayHr.classList.add('bg')
            currentBgnEl.innerText = `${e.target.value}лв. = ${round(e.target.value / currency_rate)}€ `
            // resultEur.appendChild(e)

        })

        eur.addEventListener("input", (e) => {
            e.preventDefault()
            e.stopPropagation()
            source.innerHTML = `${e.target.value}€`
            result.innerHTML = `${round(e.target.value * currency_rate)}лв.`
            displayHr.classList.remove("bg")
            displayHr.classList.add('eu')
            currentEurEl.innerText = `${e.target.value}€ = ${round(e.target.value * currency_rate)}лв.`
            // resultEur.appendChild(e)
        })

        bgn.addEventListener("change", (e) => {
            e.preventDefault()
            e.stopPropagation()
            currentBgnEl.style.cursor = "pointer"
            currentBgnEl.dataset.source = `${e.target.value}лв.`
            currentBgnEl.dataset.result = `${round(e.target.value / currency_rate)}€`
            currentBgnEl.addEventListener("click", (e)=>{
                e.preventDefault()
                displayHr.classList.remove("eu")
                displayHr.classList.add('bg')
                source.innerText = e.target.dataset.source
                result.innerText = e.target.dataset.result
            })
            currentBgnEl = document.createElement("div")
            resultBgn.insertBefore(currentBgnEl, resultBgn.firstChild)
        })

        eur.addEventListener("change", (e) => {
            e.preventDefault()
            e.stopPropagation()
            currentEurEl.style.cursor = "pointer"
            currentEurEl.dataset.source = `${e.target.value}€`
            currentEurEl.dataset.result = `${round(e.target.value * currency_rate)}лв.`
            currentEurEl.addEventListener("click", (e)=>{
                e.preventDefault()
                displayHr.classList.remove("bg")
                displayHr.classList.add('eu')
                source.innerText = e.target.dataset.source
                result.innerText = e.target.dataset.result
            })
            currentEurEl = document.createElement("div")
            resultEur.insertBefore(currentEurEl, resultEur.firstChild)
        })

        eur.addEventListener("keyup", (e)=>{
            e.preventDefault()
            e.stopPropagation()
            if (e.key === "Enter") {
                eur.value=""
            }
        })

        bgn.addEventListener("keyup", (e)=>{
            e.preventDefault()
            e.stopPropagation()
            if (e.key === "Enter") {
                bgn.value=""
            }
        })



    </script>
</body>
</html>
